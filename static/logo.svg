<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#bgGrad)"/>

  <!-- Пiвмiсяць (лiворуч) -->
  <path d="M 30 60
           A 28 28 0 1 1 30 32
           A 22 22 0 1 0 30 60"
        fill="#ffffff"
        opacity="0.95"/>

  <!-- Червоний хрест (праворуч) -->
  <g transform="translate(68, 60)">
    <!-- Вертикальна частина -->
    <rect x="-8" y="-24" width="16" height="48" rx="3" fill="url(#crossGrad)"/>
    <!-- Горизонтальна частина -->
    <rect x="-24" y="-8" width="48" height="16" rx="3" fill="url(#crossGrad)"/>
  </g>

  <!-- Свiтловий ефект -->
  <ellipse cx="35" cy="35" rx="30" ry="20" fill="white" opacity="0.1"/>
</svg>
